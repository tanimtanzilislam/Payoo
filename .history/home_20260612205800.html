<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">

  <header class="border-b-2 border-gray-300 ">

    <section class="w-11/12 mx-auto py-3 flex justify-between items-center">

        <div class="left flex gap-1 ">
            <div class="logo w-[60px]">
                <img src="./assets/logo.png" alt="Logo">
            </div>

            <div class="balance-info">
            <h2 class="text-2xl font-bold ">$<span id="balance">45000</span></h2>
            <p class="text-neutral/50 "> Available Balance </p>
        </div>
        </div>

        
        <div class="right">

            <a href="index.html" class="btn btn-soft "><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
        </div>

    </section>

  </header>


  <section class="w-11/12 mx-auto py-10 space-y-5  ">
    <h2 class="text-3xl font-bold  "> Welcome to Pay<span class="text-primary">oo</span></h2>
    <p class="text-neutral/50 ">Enjoy easy and convenient financial services with us.Cashout charge is low </p>

    <div class="buttons grid grid-cols-3  gap-3  ">

        <button class="btn flex-col h-full py-4 btn-primary btn-soft "> 
            <img src="./assets/opt-1.png" alt="Option 1">
            <p> Add Money</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft "> 
            <img src="./assets/opt-2.png" alt="Option 1">
            <p>Cash Out</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft "> 
            <img src="./assets/opt-3.png" alt="Option 1">
            <p> Send Money</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft "> 
            <img src="./assets/opt-4.png" alt="Option 1">
            <p>Get Bonus </p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft "> 
            <img src="./assets/opt-5.png" alt="Option 1">
            <p>Pay Bill </p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft "> 
            <img src="./assets/opt-6.png" alt="Option 1">
            <p>Transactions </p>
        </button>
    </div>
  </section>



  <section id="cashout" class="w-11/12 mx-auto py-5 ">

    <h2 class="text-xl font-bold mb-5 ">Cashout  </h2>


    <div class="hero-content w-full">

            <div class="card bg-base-100 w-full max-w-sm shadow-xl rounded-2xl">
                <div class="card-body">

                    <fieldset class="fieldset">

                        <label class="label text-neutral font-bold">
                            Agent  Number
                        </label>

                        <input
                            id="cashout-number"
                            type="text"
                            maxlength="11"
                            class="input rounded-full bg-base-200 w-full"
                            value="01978449064"
                            placeholder="Enter Agent 11 digit number">





                             <label class="label text-neutral font-bold">
                            Amount 
                        </label>

                        <input
                            id="cashout-amount"
                            type="text"
                            maxlength="11"
                            class="input rounded-full bg-base-200 w-full"
                            value="01978449064"
                            placeholder="Enter Cashout Amount">

                        <label class="label text-neutral font-bold mt-3">
                            4 Digit PIN
                        </label>

                        <input
                            id="input-pin"
                            type="password"
                            maxlength="4"
                            class="input rounded-full bg-base-200 w-full"
                            placeholder="Enter 4 digit PIN">

                        <div class="mt-2">
                            <a class="link link-hover">
                                Forgot password?
                            </a>
                        </div>

                        <button
                            id="login-btn"
                            class="btn btn-primary rounded-full mt-4">
                            Login
                        </button>

                    </fieldset>

                </div>
            </div>

        </div>
  </section>


<script src="./script/cashout.js"></script>
 

</body>
</html>
