<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Login</title>

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">

    <!-- Logo -->
    <div class="w-[200px] mx-auto pt-20">
        <img src="./assets/Logo-full.png" alt="Payoo Logo">
    </div>

    <!-- Login Form -->
    <div class="form pt-10">
        <div class="hero-content w-full">

            <div class="card bg-base-100 w-full max-w-sm shadow-xl rounded-2xl">
                <div class="card-body">

                    <fieldset class="fieldset">

                        <label class="label text-neutral font-bold">
                            Mobile Number
                        </label>

                        <input
                            id="input-number"
                            type="text"
                            maxlength="11"
                            class="input rounded-full bg-base-200 w-full"
                            value="01978449064"
                            placeholder="Enter your 11 digit number">

                        <label class="label text-neutral font-bold mt-3">
                            4 Digit PIN
                        </label>

                        <input
                            id="input-pin"
                            type="password"
                            maxlength="4"
                            class="input rounded-full bg-base-200 w-full"
                            placeholder="Enter 4 digit PIN">

                        <div class="mt-2">
                            <a class="link link-hover">
                                Forgot password?
                            </a>
                        </div>

                        <button
                            id="login-btn"
                            class="btn btn-primary rounded-full mt-4">
                            Login
                        </button>

                    </fieldset>

                </div>
            </div>

        </div>
    </div>

    <!-- JS File -->
    <script src="./script/login.js"></script>

</body>
</html>
