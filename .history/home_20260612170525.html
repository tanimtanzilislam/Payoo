<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">

  <header class="border-b-2 border-gray-300 ">

    <section class="w-11/12 mx-auto py-3 flex justify-between items-center">

        <div class="left flex gap-1 ">
            <div class="logo w-[60px]">
                <img src="./assets/logo.png" alt="Logo">
            </div>

            <div class="balance-info">
            <h2 class="text-2xl font-bold ">$<span id="balance">45000</span></h2>
        </div>
        </div>

        
        <div class="right">

            <a href="index.html" class="btn btn-soft "><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
        </div>

    </section>

  </header>

</body>
</html>
